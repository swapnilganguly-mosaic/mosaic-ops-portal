<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mosaic Ops Portal</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; }

  /* ── Layout ── */
  .shell { display: flex; height: 100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: 228px; flex-shrink: 0;
    background: #1a1d2e;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .brand {
    padding: 22px 20px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .brand-logo {
    display: flex; align-items: center; gap: 10px;
  }
  .brand-icon {
    width: 34px; height: 34px; border-radius: 8px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 800; font-size: 15px; letter-spacing: -1px;
  }
  .brand-name { color: #fff; font-size: 15px; font-weight: 700; line-height: 1.2; }
  .brand-sub  { color: rgba(255,255,255,0.45); font-size: 11px; margin-top: 2px; }

  .nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
  .nav-section { color: rgba(255,255,255,0.3); font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 8px 4px; }

  .nav-item {
    display: flex; align-items: center; gap: 11px;
    padding: 10px 10px; border-radius: 8px; cursor: pointer;
    color: rgba(255,255,255,0.6); font-size: 13.5px; font-weight: 500;
    transition: background 0.15s, color 0.15s;
    user-select: none; border: none; background: none; width: 100%; text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
  .nav-item.active {
    background: rgba(124,58,237,0.25); color: #fff;
  }
  .nav-item.active .nav-icon { color: #a78bfa; }
  .nav-icon { font-size: 17px; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-label { flex: 1; }
  .nav-badge {
    font-size: 10px; padding: 2px 7px; border-radius: 20px;
    background: rgba(124,58,237,0.35); color: #c4b5fd; font-weight: 600;
  }

  .sidebar-footer {
    padding: 14px 20px;
    border-top: 1px solid rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.3); font-size: 11px;
  }

  /* ── Main ── */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .topbar {
    height: 52px; flex-shrink: 0;
    background: #fff; border-bottom: 1px solid #e8eaee;
    display: flex; align-items: center; padding: 0 24px; gap: 12px;
  }
  .topbar-title { font-size: 15px; font-weight: 700; color: #1a1d2e; }
  .topbar-url   { font-size: 12px; color: #9ca3af; flex: 1; }
  .topbar-btn {
    font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid #e2e8f0;
    background: #fff; color: #4b5563; cursor: pointer; font-weight: 500;
    transition: background 0.12s;
  }
  .topbar-btn:hover { background: #f3f4f6; }

  .frame-wrap { flex: 1; position: relative; overflow: hidden; }
  .frame-wrap iframe {
    position: absolute; inset: 0; width: 100%; height: 100%;
    border: none; display: none;
  }
  .frame-wrap iframe.visible { display: block; }

  /* Loading overlay */
  .loader {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: #f5f6fa; gap: 14px;
  }
  .loader.hidden { display: none; }
  .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid #e5e7eb; border-top-color: #7c3aed;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { color: #9ca3af; font-size: 13px; }

  /* Welcome screen */
  .welcome {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; background: #f5f6fa;
  }
  .welcome.hidden { display: none; }
  .welcome-icon { font-size: 48px; }
  .welcome-title { font-size: 22px; font-weight: 700; color: #1a1d2e; }
  .welcome-sub { font-size: 14px; color: #9ca3af; text-align: center; max-width: 340px; line-height: 1.6; }
  .welcome-cards { display: flex; gap: 16px; margin-top: 8px; }
  .welcome-card {
    background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
    padding: 18px 22px; cursor: pointer; text-align: center; min-width: 160px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .welcome-card:hover { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }
  .welcome-card-icon { font-size: 28px; margin-bottom: 8px; }
  .welcome-card-title { font-size: 13px; font-weight: 600; color: #1a1d2e; }
  .welcome-card-sub { font-size: 11px; color: #9ca3af; margin-top: 4px; }
</style>
</head>
<body>
<div class="shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">
        <div class="brand-icon">M</div>
        <div>
          <div class="brand-name">Mosaic Wellness</div>
          <div class="brand-sub">Ops Portal</div>
        </div>
      </div>
    </div>

    <nav class="nav">
      <div class="nav-section">Planning</div>
      <button class="nav-item" data-tool="mrp" onclick="openTool('mrp')">
        <span class="nav-icon">📦</span>
        <span class="nav-label">MRP Tool</span>
        <span class="nav-badge">M1·M2</span>
      </button>
      <button class="nav-item" data-tool="scheduler" onclick="openTool('scheduler')">
        <span class="nav-icon">🗓️</span>
        <span class="nav-label">Production Scheduler</span>
      </button>
    </nav>

    <div class="sidebar-footer">Mosaic Wellness · Internal Tools</div>
  </aside>

  <!-- Main area -->
  <main class="main">
    <!-- Topbar -->
    <div class="topbar">
      <span class="topbar-title" id="topTitle">Select a tool</span>
      <span class="topbar-url" id="topUrl"></span>
      <button class="topbar-btn" onclick="reloadFrame()" title="Reload tool" style="display:none" id="btnReload">↺ Reload</button>
      <button class="topbar-btn" onclick="openExternal()" title="Open in new tab" style="display:none" id="btnExternal">↗ Open full</button>
    </div>

    <!-- Content -->
    <div class="frame-wrap" id="frameWrap">
      <!-- Welcome -->
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🏭</div>
        <div class="welcome-title">Mosaic Ops Portal</div>
        <div class="welcome-sub">Your planning tools in one place. Choose a tool from the sidebar or click below.</div>
        <div class="welcome-cards">
          <div class="welcome-card" onclick="openTool('mrp')">
            <div class="welcome-card-icon">📦</div>
            <div class="welcome-card-title">MRP Tool</div>
            <div class="welcome-card-sub">Forward planning · M1 &amp; M2</div>
          </div>
          <div class="welcome-card" onclick="openTool('scheduler')">
            <div class="welcome-card-icon">🗓️</div>
            <div class="welcome-card-title">Production Scheduler</div>
            <div class="welcome-card-sub">Batch &amp; line scheduling</div>
          </div>
        </div>
      </div>

      <!-- Loader -->
      <div class="loader hidden" id="loader">
        <div class="spinner"></div>
        <div class="loader-text" id="loaderText">Loading…</div>
      </div>

      <!-- iframes (pre-created, lazy-loaded) -->
      <iframe id="frame-mrp"       src="" title="MRP Tool"></iframe>
      <iframe id="frame-scheduler" src="" title="Production Scheduler"></iframe>
    </div>
  </main>
</div>

<script>
const TOOLS = {
  mrp: {
    label: 'MRP Tool — Forward Planning',
    url:   'https://mrp-forward.vercel.app',
    icon:  '📦',
  },
  scheduler: {
    label: 'Production Scheduler',
    url:   'https://production-scheduler-flame.vercel.app/',
    icon:  '🗓️',
  },
};

let activeTool = null;
const loaded = {};

function openTool(key) {
  if (activeTool === key) return;

  // Hide welcome, show loader
  document.getElementById('welcome').classList.add('hidden');
  document.getElementById('loader').classList.remove('hidden');
  document.getElementById('loaderText').textContent = 'Loading ' + TOOLS[key].label + '…';

  // Hide all iframes
  Object.keys(TOOLS).forEach(k => {
    const f = document.getElementById('frame-' + k);
    f.classList.remove('visible');
  });

  // Update sidebar active state
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.tool === key);
  });

  // Update topbar
  document.getElementById('topTitle').textContent = TOOLS[key].icon + '  ' + TOOLS[key].label;
  document.getElementById('topUrl').textContent = TOOLS[key].url;
  document.getElementById('btnReload').style.display = '';
  document.getElementById('btnExternal').style.display = '';

  activeTool = key;

  const frame = document.getElementById('frame-' + key);

  if (!loaded[key]) {
    // First load — set src and wait for load event
    loaded[key] = true;
    frame.onload = () => {
      document.getElementById('loader').classList.add('hidden');
      frame.classList.add('visible');
    };
    // Timeout fallback in case onload doesn't fire (cross-origin)
    setTimeout(() => {
      document.getElementById('loader').classList.add('hidden');
      frame.classList.add('visible');
    }, 4000);
    frame.src = TOOLS[key].url;
  } else {
    // Already loaded — just show it
    document.getElementById('loader').classList.add('hidden');
    frame.classList.add('visible');
  }
}

function reloadFrame() {
  if (!activeTool) return;
  const frame = document.getElementById('frame-' + activeTool);
  document.getElementById('loader').classList.remove('hidden');
  frame.classList.remove('visible');
  frame.onload = () => {
    document.getElementById('loader').classList.add('hidden');
    frame.classList.add('visible');
  };
  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
    frame.classList.add('visible');
  }, 4000);
  frame.src = frame.src;
}

function openExternal() {
  if (!activeTool) return;
  window.open(TOOLS[activeTool].url, '_blank');
}
</script>
</body>
</html>
